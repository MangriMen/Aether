[package]
name = "aether"
version = "0.8.7"
description = "Desktop application for managing Minecraft instances and mods"
edition = "2021"

[features]
# This feature is used for production builds or when a dev server is not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = "2"

[build-dependencies]
tauri-build = { version = "2", features = ["codegen"] }

[dependencies]
tauri = { version = "2", features = ['tray-icon'] }
tauri-plugin-dialog = "2"
tauri-plugin-log = "2"
tauri-plugin-os = "2"
tauri-plugin-shell = "2"
tauri-plugin-process = "2"


uuid = { version = "1.10", features = ["serde", "v4"] }

async-trait = "0.1.83"


dashmap = { version = "6", features = ["serde"] }
open = { version = "5", features = ["shellexecute-on-windows"] }

daedalus = { git = "https://github.com/modrinth/code", version = "0.2.3" }

serr = { git = 'https://github.com/MangriMen/serr.git', version = "0.2.0", features = [
  "derive",
] }
semver = "1.0.27"
tauri-plugin-opener = "2"
tauri-plugin-clipboard-manager = "2"

anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
log.workspace = true
tokio.workspace = true

aether-core.workspace = true
