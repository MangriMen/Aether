[workspace]
resolver = "2"
members = [
  "apps/desktop/src-tauri",
  "packages/core/aether-core",
  "packages/core/aether-core-gen",
  "packages/core/aether-core-plugin-api",
  "packages/core/register-schema",
  "packages/core/register-schema-derive",
]

[profile.release]
opt-level = 3 # Maximize runtime performance (critical for Wasm/Extism performance)
codegen-units = 16 # Split crates into 16 chunks to compile in parallel across all cores
lto = "thin" # Enable fast parallel Link-Time Optimization
strip = true # Automatically strip symbols from the binary (greatly reduces .exe size)
panic = "abort" # Remove stack unwinding code to reduce size and slightly speed up builds

[workspace.dependencies]
aether-core = { path = "packages/core/aether-core" }
aether-core-plugin-api = { path = "packages/core/aether-core-plugin-api" }
register-schema = { path = "packages/core/register-schema" }
register-schema-derive = { path = "packages/core/register-schema-derive" }

schemars = "1.2.1"

serde = { version = "1.0", features = ["derive"] }
