[package]
name = "aether-core"
version = "0.8.0"
edition.workspace = true

[dependencies]
# Async & Streams
futures = "0.3.32"
tokio-stream = { version = "0.1.18", features = ["fs"] }

# Networking & API
daedalus = { git = "https://github.com/modrinth/code", version = "0.2.3" }
reqwest = { version = "0.13.4", features = [
    "json",
    "stream",
    "deflate",
    "gzip",
    "brotli",
] }
reqwest-middleware = "0.5.2"
serde_qs = "1.1.2"
url = "2.5.8"

# System & Files
bytes = "1.12.1"
dunce = "1.0.5"
notify = "8.2.0"
notify-debouncer-mini = "0.7.0"
path-slash = "0.2.1"
sys-info = "0.9.1"
sysinfo = "0.39.6"
tempfile = "3.27.0"
zip = "8.6.0"

# Plugins & Extism
aether-core-plugin-api = { path = "../aether-core-plugin-api" }
extism = "1.30.0"
extism-convert = "1.30.0"

# Observability & Logging
tracing = "0.1.44"
tracing-error = "0.2.1"

# Utilities
dashmap = { version = "6.2.1", features = ["serde"] }
regex = "1.13.0"
sha1_smol = { version = "1.0.1", features = ["alloc", "serde", "std"] }
toml = "1.1.3"

# Workspace Dependencies
anyhow.workspace = true
async-trait.workspace = true
chrono.workspace = true
log.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
sqlx = { workspace = true, features = [
    "json",
    "macros",
    "migrate",
    "runtime-tokio",
    "sqlite",
    "sqlx-toml",
    "uuid",
    "chrono",
] }
thiserror.workspace = true
tokio.workspace = true
uuid.workspace = true

[dev-dependencies]
rust_arkitect = "0.3.7"

[lints]
workspace = true
