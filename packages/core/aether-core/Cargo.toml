[package]
name = "aether-core"
version = "0.8.0"
edition = "2021"


[dependencies]
tokio-stream = { version = "0.1", features = ["fs"] }
futures = "0.3"

tracing = "0.1.40"
tracing-error = "0.2.0"

reqwest = { version = "0.13.2", features = [
    "json",
    "stream",
    "deflate",
    "gzip",
    "brotli",
] }
reqwest-middleware = "0.5.1"
reqwest-retry = "0.9.1"

toml = "0.8.19"

daedalus = { git = "https://github.com/modrinth/code", version = "0.2.3" }

uuid = { version = "1.10", features = ["serde", "v4"] }

bytes = "1.6"
chrono = { version = "0.4", features = ["serde"] }
sysinfo = "0.38.4"
sys-info = "0.9"
url = "2.5"

regex = "1.10"
dunce = "1"

zip = "8.5.1"

lazy_static = "1.5.0"
dashmap = { version = "6", features = ["serde"] }

async-trait = "0.1.83"

notify = "8.0.0"
notify-debouncer-mini = "0.7.0"

sha1_smol = { version = "1.0.1", features = ["alloc", "serde", "std"] }
extism = "1.21.0"
extism-convert = "1.21.0"
path-slash = "0.2.1"
serde_qs = "1.1.1"
semver = "1.0.26"

serr = { git = 'https://github.com/MangriMen/serr.git', version = "0.2.0", features = [
    "derive",
] }
serde_with = "3.13.0"
tempfile = "3.23.0"

aether-core-plugin-api = { path = "../aether-core-plugin-api" }

anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
log.workspace = true
tokio.workspace = true

schemars.workspace = true
register-schema.workspace = true
