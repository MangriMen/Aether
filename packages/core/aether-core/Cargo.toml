[package]
name = "aether-core"
version = "0.8.0"
edition.workspace = true

[dependencies]
# Async & Streams
futures = "0.3"
tokio-stream = { version = "0.1", features = ["fs"] }

# Networking & API
daedalus = { git = "https://github.com/modrinth/code", version = "0.2.3" }
reqwest = { version = "0.13.2", features = [
    "json",
    "stream",
    "deflate",
    "gzip",
    "brotli",
] }
reqwest-middleware = "0.5.1"
reqwest-retry = "0.9.1"
serde_qs = "1.1.1"
url = "2.5"

# System & Files
bytes = "1.6"
dunce = "1"
notify = "8.0.0"
notify-debouncer-mini = "0.7.0"
path-slash = "0.2.1"
sys-info = "0.9"
sysinfo = "0.38.4"
tempfile = "3.23.0"
zip = "8.5.1"

# Plugins & Extism
aether-core-plugin-api = { path = "../aether-core-plugin-api" }
extism = "1.21.0"
extism-convert = "1.21.0"

# Observability & Logging
tracing = "0.1.40"
tracing-error = "0.2.0"

# Utilities
dashmap = { version = "6", features = ["serde"] }
regex = "1.10"
sha1_smol = { version = "1.0.1", features = ["alloc", "serde", "std"] }
toml = "0.8.19"

# Workspace Dependencies
anyhow.workspace = true
async-trait.workspace = true
chrono.workspace = true
log.workspace = true
register-schema.workspace = true
schemars.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
serr.workspace = true
thiserror.workspace = true
tokio.workspace = true
uuid.workspace = true
sqlx = { workspace = true, features = [
    "json",
    "macros",
    "migrate",
    "runtime-tokio",
    "sqlite",
    "uuid",
] }

[lints]
workspace = true
