name: Build executable

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Disabled macos for now.
          # - platform: 'macos-latest' # for Arm based macs (M1 and above).
          # args: '--target aarch64-apple-darwin'
          # - platform: 'macos-latest' # for Intel based macs.
          # args: '--target x86_64-apple-darwin'
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          JSON_VERSION=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)
          TAG_VERSION=${GITHUB_REF_NAME#v}

          if [ "$JSON_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag is $TAG_VERSION but tauri.conf.json is $JSON_VERSION"
            exit 1
          fi

          echo "APP_VERSION=$JSON_VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.get_version.outputs.APP_VERSION }}
          path: ./apps/desktop/CHANGELOG.md

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "v${{ steps.get_version.outputs.APP_VERSION }}"
          releaseBody: ${{ steps.changelog_reader.outputs.changes }}
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
